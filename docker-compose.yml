# Self-hosted Foyer: app + Postgres + MinIO + nightly backups.
#
#   cp .env.example .env   # fill in RESEND_API_KEY etc.
#   docker compose up -d
#
# Put a TLS-terminating proxy (Caddy, Traefik, nginx, Cloudflare Tunnel)
# in front of port 3000 and set NEXT_PUBLIC_APP_URL to its public URL.

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://foyer:${POSTGRES_PASSWORD:-foyer}@db:5432/foyer
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Foyer <onboarding@resend.dev>}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: foyer
      S3_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-foyer-secret}
      S3_BUCKET: foyer
      S3_FORCE_PATH_STYLE: "true"
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: foyer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foyer}
      POSTGRES_DB: foyer
    volumes:
      - foyer_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foyer"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: foyer
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-foyer-secret}
    volumes:
      - foyer_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 foyer ${MINIO_PASSWORD:-foyer-secret} &&
      mc mb -p local/foyer || true
      "

  # Nightly logical backups of Postgres, kept 14 days.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-foyer}
    volumes:
      - ./backups:/backups
    entrypoint: >
      /bin/sh -c "
      while true; do
        pg_dump -h db -U foyer foyer | gzip > /backups/foyer-$$(date +%Y%m%d-%H%M).sql.gz &&
        find /backups -name '*.sql.gz' -mtime +14 -delete;
        sleep 86400;
      done
      "

volumes:
  foyer_pg:
  foyer_minio:
